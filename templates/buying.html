<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buy Crops - Fasal Bazaar</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-content" style="justify-content: space-between">
          <a
            href="index.html"
            class="logo"
            style="text-decoration: none; color: inherit"
            >Fasal Bazaar</a
          >
          <nav
            class="main-nav"
            style="background: transparent; padding: 0; box-shadow: none"
          >
            <div class="nav-container" style="gap: 50px">
              <a
                href="index.html"
                style="color: #333; text-decoration: none; font-weight: 600"
                >Home</a
              >
              <a
                href="buying.html"
                style="color: #1a5490; text-decoration: none; font-weight: 600"
                >Buy Crops</a
              >
              <a
                href="selling.html"
                style="color: #333; text-decoration: none; font-weight: 600"
                >Sell Crops</a
              >
            </div>
          </nav>
          <div id="userSection"></div>
        </div>
      </div>
    </header>

    <div class="container form-container">
      <div class="progress-tabs">
        <div class="tab active">Post a Buyer Request</div>
      </div>

      <form id="buyingForm" class="checkout-form">
        <div class="form-grid">
          <div class="form-left">
            <h3>Buyer Details</h3>

            <div class="form-group">
              <label for="firstName">First Name*</label>
              <input type="text" id="firstName" required />
            </div>

            <div class="form-group">
              <label for="lastName">Last Name*</label>
              <input type="text" id="lastName" required />
            </div>

            <div class="form-group">
              <label for="email">Email Address*</label>
              <input type="email" id="email" required />
            </div>

            <div class="form-group">
              <label for="phone">Phone Number*</label>
              <input type="tel" id="phone" required />
            </div>

            <div class="form-group">
              <label for="street">Street Address*</label>
              <input type="text" id="street" required />
            </div>

            <div class="form-group">
              <label for="postcode">Pincode* (Enter to auto-fill)</label>
              <input
                type="text"
                id="postcode"
                maxlength="6"
                placeholder="Enter 6-digit pincode"
                required
              />
              <small
                id="locationMsg"
                style="display: block; margin-top: 5px; font-size: 12px"
              ></small>
            </div>

            <div class="form-group">
              <label for="city">Town / City*</label>
              <input type="text" id="city" required />
            </div>

            <div class="form-group">
              <label for="state">State*</label>
              <input type="text" id="state" required />
            </div>

            <div class="form-group">
              <label for="country">Country*</label>
              <input type="text" id="country" value="India" required />
            </div>
          </div>

          <div class="form-right">
            <h3>Requirement Details</h3>

            <div class="form-group">
              <label for="cropName">Crop Name*</label>
              <input
                type="text"
                id="cropName"
                placeholder="e.g. Basmati Rice"
                required
              />
            </div>

            <div class="form-group">
              <label for="amountRequired">Quantity Required*</label>
              <input
                type="text"
                id="amountRequired"
                placeholder="e.g., 500 Kg"
                required
              />
            </div>

            <div class="form-group">
              <label for="startingCost">Target Price / Budget*</label>
              <input
                type="text"
                id="startingCost"
                placeholder="e.g., ₹45/kg"
                required
              />
            </div>

            <div class="form-group">
              <label for="deliveryPayable">Delivery Preference*</label>
              <select id="deliveryPayable" required>
                <option value="">Select option...</option>
                <option value="Buyer Arranges Transport">
                  I will arrange transport
                </option>
                <option value="Seller Must Deliver">
                  Seller must deliver (Included in price)
                </option>
                <option value="Negotiable">Negotiable</option>
              </select>
            </div>

            <div class="form-group">
              <label for="requirements">Specific Quality Requirements</label>
              <textarea
                id="requirements"
                rows="4"
                placeholder="e.g. Moisture content below 12%, organic certified..."
              ></textarea>
            </div>

            <button type="submit" class="submit-btn" style="margin-top: 20px">
              Post Buying Request
            </button>
          </div>
        </div>
      </form>
    </div>

    <footer>
      <div class="footer-bottom">
        <div class="container">
          <p>&copy; 2025 Fasal Bazaar Ltd.</p>
        </div>
      </div>
    </footer>
    <script src="api.js"></script>
    <script src="reverie.js"></script>
    <script src="site-translate.js"></script>
    <script src="buying-script.js"></script>
  </body>
</html>
