<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fasal Bazaar - Product Details</title>
    <link rel="stylesheet" href="Product_Page.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <a href="index.html" class="logo" style="text-decoration: none"
          >Fasal Bazaar</a
        >
        <nav class="nav">
          <a href="index.html">Home</a>
          <a href="buying.html">Buy Crops</a>
          <a href="selling.html">Sell Crops</a>
        </nav>
        <div class="header-icons">
          <div id="userSection" class="user-info"></div>
          <button
            class="icon-button"
            id="cartButton"
            onclick="window.location.href = 'checkout.html'"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path
                d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
              />
            </svg>
            <span class="cart-badge hidden" id="cartBadge">0</span>
          </button>
        </div>
      </div>
    </header>

    <div class="breadcrumb">
      <a href="index.html" style="color: inherit; text-decoration: none"
        >Home</a
      >
      <span>&gt;</span>
      <span id="breadcrumbCategory">Crops</span>
      <span>&gt;</span>
      <span id="breadcrumbName">Loading...</span>
    </div>

    <div class="product-container">
      <div class="gallery-container">
        <div class="thumbnail-column" id="thumbnailColumn"></div>
        <div class="main-image" id="mainImageDisplay"></div>
      </div>

      <div class="product-info">
        <div class="product-header">
          <div>
            <h2 class="product-name" id="pName">Loading...</h2>
            <p class="location" id="pLocation">
              <i class="fas fa-map-marker-alt"></i> Loading...
            </p>
          </div>
          <button class="favorite-button" id="favoriteButton">
            <svg class="heart-icon" id="heartIcon" viewBox="0 0 24 24">
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
              />
            </svg>
          </button>
        </div>

        <div class="price-row">
          <span class="price" id="pPrice">₹0/kg</span>
          <div class="rating-container">
            <div class="stars" id="avgStars">
              <i class="fas fa-star"></i><i class="fas fa-star"></i
              ><i class="fas fa-star"></i><i class="fas fa-star"></i
              ><i class="fas fa-star-half-alt"></i>
            </div>
            <span class="review-count" id="pReviewCount">(0 reviews)</span>
          </div>
        </div>

        <div
          style="
            margin-top: 10px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
          "
        >
          <h4 style="font-size: 14px; margin-bottom: 5px; color: #1a5490">
            Seller Details
          </h4>
          <p id="pSeller" style="font-weight: 600; margin-bottom: 0">
            Farmer Name
          </p>
          <p style="font-size: 12px; color: #666; margin-top: 4px">
            <i class="fas fa-lock"></i> Contact details available in Shortlist
          </p>
        </div>

        <h4
          style="
            margin-top: 20px;
            font-size: 14px;
            text-transform: uppercase;
            color: #6b7280;
          "
        >
          Description
        </h4>
        <p class="description" id="pDescription">Loading description...</p>

        <h4
          style="
            margin-top: 15px;
            font-size: 14px;
            text-transform: uppercase;
            color: #6b7280;
          "
        >
          Highlights
        </h4>
        <ul class="feature-list" id="pFeatures"></ul>

        <div class="quantity-control" style="margin-top: 20px">
          <button class="quantity-button" id="decreaseQty">−</button>
          <span class="quantity-display" id="quantity">1</span>
          <button class="quantity-button" id="increaseQty">+</button>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 10px">
          <button
            class="add-to-cart-button"
            id="addToCartBtn"
            style="flex: 1; width: 100%"
          >
            Add to Inquiry Shortlist
          </button>
        </div>
      </div>
    </div>

    <div class="reviews-section">
      <div class="tabs">
        <button class="tab active">Reviews</button>
      </div>

      <div class="reviews-list" id="reviewsList"></div>

      <div class="review-form">
        <div class="form-content">
          <div class="avatar"></div>
          <form class="form-fields" id="reviewForm">
            <div class="form-row">
              <div class="field-container">
                <label class="rating-label">Your Name:</label>
                <input
                  type="text"
                  class="input"
                  placeholder="e.g. John Doe"
                  id="reviewName"
                  required
                />
              </div>
              <div class="field-container">
                <label class="rating-label">Your Email:</label>
                <input
                  type="email"
                  class="input"
                  placeholder="e.g. john@example.com"
                  id="reviewEmail"
                  required
                />
              </div>
            </div>

            <div class="field-container" style="margin-top: 1rem">
              <label class="rating-label">Write your review:</label>
              <textarea
                class="textarea"
                placeholder="Share your experience with this crop..."
                id="reviewComment"
                required
              ></textarea>
            </div>

            <div class="form-footer">
              <div class="rating-row">
                <span class="rating-label">Your Ratings:</span>
                <div class="stars" id="reviewStars">
                  <svg
                    class="star star-clickable star-empty"
                    data-rating="1"
                    viewBox="0 0 24 24"
                  >
                    <polygon
                      points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                      stroke-width="2"
                    />
                  </svg>
                  <svg
                    class="star star-clickable star-empty"
                    data-rating="2"
                    viewBox="0 0 24 24"
                  >
                    <polygon
                      points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                      stroke-width="2"
                    />
                  </svg>
                  <svg
                    class="star star-clickable star-empty"
                    data-rating="3"
                    viewBox="0 0 24 24"
                  >
                    <polygon
                      points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                      stroke-width="2"
                    />
                  </svg>
                  <svg
                    class="star star-clickable star-empty"
                    data-rating="4"
                    viewBox="0 0 24 24"
                  >
                    <polygon
                      points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                      stroke-width="2"
                    />
                  </svg>
                  <svg
                    class="star star-clickable star-empty"
                    data-rating="5"
                    viewBox="0 0 24 24"
                  >
                    <polygon
                      points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                      stroke-width="2"
                    />
                  </svg>
                </div>
              </div>
              <button type="submit" class="submit-button">Post Review →</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div
        class="footer-content"
        style="display: flex; justify-content: center"
      >
        <p>&copy; 2025 Fasal Bazaar Ltd.</p>
      </div>
    </footer>
    <script src="api.js"></script>
    <script src="Product_Page.js"></script>
    <script src="reverie.js"></script>
    <script src="site-translate.js"></script>
  </body>
</html>
