<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buyer Request - Fasal Bazaar</title>
    <link rel="stylesheet" href="Product_Page.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      /* Overrides specifically for the Request Page to center content */
      .product-container {
        display: block; /* Remove grid to allow full width/centering */
        max-width: 900px;
      }
      .request-card {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      }
      .req-badge {
        background: #e0f2fe;
        color: #0284c7;
        font-weight: 700;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        text-transform: uppercase;
        display: inline-block;
        margin-bottom: 15px;
      }
      .data-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin: 25px 0;
        background: #f9fafb;
        padding: 20px;
        border-radius: 8px;
      }
      .data-item label {
        display: block;
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 4px;
      }
      .data-item span {
        font-size: 16px;
        font-weight: 600;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <a href="index.html" class="logo" style="text-decoration: none"
          >Fasal Bazaar</a
        >
        <nav class="nav">
          <a href="index.html">Home</a>
          <a href="buying.html">Buy Crops</a>
          <a href="selling.html">Sell Crops</a>
        </nav>
        <div class="header-icons">
          <div id="userSection"></div>
          <button
            class="icon-button"
            id="cartButton"
            onclick="window.location.href = 'checkout.html'"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path
                d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
              />
            </svg>
            <span class="cart-badge hidden" id="cartBadge">0</span>
          </button>
        </div>
      </div>
    </header>

    <div class="breadcrumb">
      <a href="index.html" style="color: inherit; text-decoration: none"
        >Home</a
      >
      <span>&gt;</span>
      <span>Buyer Requests</span>
      <span>&gt;</span>
      <span id="breadcrumbName">Loading...</span>
    </div>

    <div class="product-container">
      <div class="request-card">
        <span class="req-badge">Active Buyer Request</span>
        <h1 class="product-name" id="reqName" style="margin-bottom: 10px">
          Loading...
        </h1>
        <p class="location" id="reqLocation">
          <i class="fas fa-map-marker-alt"></i> Loading...
        </p>

        <div class="data-grid">
          <div class="data-item">
            <label>Target Price</label>
            <span id="reqPrice" style="color: #1a5490; font-size: 18px">-</span>
          </div>
          <div class="data-item">
            <label>Quantity Required</label>
            <span id="reqQty">-</span>
          </div>
          <div class="data-item">
            <label>Delivery Preference</label>
            <span id="reqDelivery">-</span>
          </div>
          <div class="data-item">
            <label>Posted By</label>
            <span id="reqBuyer">-</span>
          </div>
        </div>

        <h4
          style="
            font-size: 14px;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 10px;
          "
        >
          Detailed Requirements
        </h4>
        <p class="description" id="reqDesc">Loading...</p>

        <div style="margin-top: 30px">
          <button
            class="add-to-cart-button"
            id="addToShortlistBtn"
            style="width: 100%"
          >
            Add to Inquiry Shortlist
          </button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div
        class="footer-content"
        style="display: flex; justify-content: center"
      >
        <p>&copy; 2025 Fasal Bazaar Ltd.</p>
      </div>
    </footer>
    <script src="api.js"></script>
    <script src="Request_Page.js"></script>
    <script src="reverie.js"></script>
    <script src="site-translate.js"></script>
  </body>
</html>
