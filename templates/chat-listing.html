<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Your Crop — Fasal Bazaar</title>
    <style>
      /* ── Reset & tokens ─────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green-dark: #2d5016;
        --green: #5a8c2e;
        --green-light: #7ab340;
        --green-pale: #e8f5d8;
        --blue: #1a5490;
        --bg: #f5f5f0;
        --white: #ffffff;
        --gray-1: #f0f0ec;
        --gray-2: #d4d4cc;
        --gray-3: #888880;
        --text: #1c1c18;
        --text-light: #555550;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
        --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.13);
        --r-sm: 10px;
        --r-md: 16px;
        --r-lg: 24px;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Top bar ─────────────────────────────────────────────────────── */
      .topbar {
        background: var(--green-dark);
        color: var(--white);
        padding: 0 16px;
        height: 56px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        box-shadow: var(--shadow-md);
        z-index: 10;
      }

      .topbar-back {
        background: none;
        border: none;
        color: var(--white);
        font-size: 22px;
        cursor: pointer;
        display: flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 8px;
        transition: background 0.2s;
      }
      .topbar-back:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .topbar-info {
        flex: 1;
      }
      .topbar-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      .topbar-sub {
        font-size: 11px;
        opacity: 0.75;
        margin-top: 1px;
      }

      .topbar-avatar {
        width: 36px;
        height: 36px;
        background: var(--green);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }

      /* ── Chat background pattern ─────────────────────────────────────── */
      .chat-bg {
        flex: 1;
        overflow-y: auto;
        padding: 16px 12px 12px;
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(90, 140, 46, 0.06) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(26, 84, 144, 0.05) 0%,
            transparent 50%
          ),
          var(--bg);
        scroll-behavior: smooth;
      }

      /* ── Messages ────────────────────────────────────────────────────── */
      #chat-messages {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 640px;
        margin: 0 auto;
        padding-bottom: 8px;
      }

      .chat-msg {
        display: flex;
        gap: 8px;
        align-items: flex-end;
        animation: fadeUp 0.28s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .chat-msg.user {
        flex-direction: row-reverse;
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .bot-avatar {
        background: var(--green-pale);
      }

      .bubble {
        max-width: min(72%, 420px);
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 14.5px;
        line-height: 1.5;
        word-wrap: break-word;
      }

      .bot-bubble {
        background: var(--white);
        border-bottom-left-radius: 4px;
        box-shadow: var(--shadow-sm);
        color: var(--text);
      }

      .user-bubble {
        background: var(--green-dark);
        color: var(--white);
        border-bottom-right-radius: 4px;
      }

      /* ── Loading indicator ───────────────────────────────────────────── */
      #chat-loading {
        display: none;
        padding-left: 40px;
        animation: fadeUp 0.2s ease both;
      }
      .typing-dots {
        display: inline-flex;
        gap: 4px;
        background: var(--white);
        padding: 10px 14px;
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        box-shadow: var(--shadow-sm);
      }
      .typing-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--gray-2);
        animation: blink 1.2s infinite both;
      }
      .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.25;
          transform: scale(0.85);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* ── Option chips ────────────────────────────────────────────────── */
      .option-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding-left: 40px;
        animation: fadeUp 0.28s ease both;
      }

      .chip-btn {
        background: var(--white);
        border: 1.5px solid var(--green);
        color: var(--green-dark);
        border-radius: 20px;
        padding: 7px 16px;
        font-size: 13.5px;
        cursor: pointer;
        font-weight: 600;
        transition:
          background 0.2s,
          color 0.2s,
          transform 0.15s;
      }
      .chip-btn:hover {
        background: var(--green);
        color: var(--white);
        transform: translateY(-1px);
      }
      .chip-btn.skip-btn {
        border-color: var(--gray-2);
        color: var(--gray-3);
      }
      .chip-btn.skip-btn:hover {
        background: var(--gray-2);
        color: var(--text);
      }

      /* ── Language grid ───────────────────────────────────────────────── */
      .lang-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 8px;
        padding: 4px 0 4px 40px;
        animation: fadeUp 0.28s ease both;
      }

      .lang-btn {
        background: var(--white);
        border: 1.5px solid var(--gray-2);
        border-radius: var(--r-sm);
        padding: 10px 8px;
        cursor: pointer;
        text-align: center;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.15s;
      }
      .lang-btn:hover,
      .lang-btn.selected {
        border-color: var(--green);
        background: var(--green-pale);
        transform: translateY(-2px);
      }
      .lang-btn .native {
        display: block;
        font-size: 16px;
        font-weight: 700;
        color: var(--green-dark);
      }
      .lang-btn .english {
        display: block;
        font-size: 11px;
        color: var(--gray-3);
        margin-top: 2px;
      }

      /* ── Location card ───────────────────────────────────────────────── */
      .location-card {
        background: var(--white);
        border: 1.5px solid var(--green-pale);
        border-radius: var(--r-md);
        padding: 14px;
        margin-left: 40px;
        box-shadow: var(--shadow-sm);
        animation: fadeUp 0.28s ease both;
      }
      .loc-text {
        font-size: 14px;
        color: var(--text);
        margin-bottom: 10px;
        font-weight: 500;
      }

      /* ── Image upload ────────────────────────────────────────────────── */
      .image-upload-area {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding-left: 40px;
        animation: fadeUp 0.28s ease both;
      }

      /* ── Summary card ────────────────────────────────────────────────── */
      .summary-card {
        background: var(--white);
        border-radius: var(--r-md);
        padding: 16px;
        margin-left: 40px;
        box-shadow: var(--shadow-sm);
        border-left: 4px solid var(--green);
        animation: fadeUp 0.28s ease both;
      }
      .summary-line {
        font-size: 13.5px;
        color: var(--text);
        padding: 5px 0;
        border-bottom: 1px solid var(--gray-1);
      }
      .summary-line:last-child {
        border-bottom: none;
      }

      .summary-actions {
        padding-left: 40px;
      }
      .confirm-btn {
        background: var(--green) !important;
        color: var(--white) !important;
        border-color: var(--green) !important;
      }
      .confirm-btn:hover {
        background: var(--green-dark) !important;
      }

      /* ── Input bar ───────────────────────────────────────────────────── */
      .input-bar {
        background: var(--white);
        border-top: 1px solid var(--gray-2);
        padding: 10px 12px;
        flex-shrink: 0;
        box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
      }

      #chat-input-row {
        display: flex;
        gap: 8px;
        align-items: center;
        max-width: 640px;
        margin: 0 auto;
      }

      .input-actions {
        display: flex;
        gap: 6px;
        max-width: 640px;
        margin: 8px auto 0;
        justify-content: flex-end;
      }

      #chat-input {
        flex: 1;
        border: 1.5px solid var(--gray-2);
        border-radius: 22px;
        padding: 10px 16px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        background: var(--gray-1);
        color: var(--text);
        transition: border-color 0.2s;
      }
      #chat-input:focus {
        border-color: var(--green);
        background: var(--white);
      }

      .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
        transition:
          background 0.2s,
          transform 0.15s;
      }
      .icon-btn:hover {
        transform: scale(1.1);
      }

      #chat-mic {
        background: var(--gray-1);
        color: var(--text);
      }
      #chat-mic.recording {
        background: #e53935;
        animation: pulse-mic 0.8s infinite alternate;
      }
      @keyframes pulse-mic {
        from {
          box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4);
        }
        to {
          box-shadow: 0 0 0 8px rgba(229, 57, 53, 0);
        }
      }

      #chat-send {
        background: var(--green);
        color: var(--white);
      }
      #chat-send:hover {
        background: var(--green-dark);
      }

      #chat-skip,
      #chat-done {
        background: none;
        border: 1.5px solid var(--gray-2);
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 12.5px;
        cursor: pointer;
        color: var(--gray-3);
        font-family: inherit;
        transition: background 0.2s;
      }
      #chat-skip:hover,
      #chat-done:hover {
        background: var(--gray-1);
        color: var(--text);
      }
      #chat-done {
        border-color: var(--green);
        color: var(--green-dark);
      }

      /* ── Scrollbar ───────────────────────────────────────────────────── */
      .chat-bg::-webkit-scrollbar {
        width: 5px;
      }
      .chat-bg::-webkit-scrollbar-track {
        background: transparent;
      }
      .chat-bg::-webkit-scrollbar-thumb {
        background: var(--gray-2);
        border-radius: 3px;
      }

      /* ── Responsive ──────────────────────────────────────────────────── */
      @media (max-width: 480px) {
        .bubble {
          max-width: 85%;
        }
        .lang-grid {
          grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <!-- Top bar -->
    <header class="topbar">
      <button class="topbar-back" onclick="history.back()" title="Go back">
        &#8592;
      </button>
      <div class="topbar-info">
        <div class="topbar-title" id="topbar-title-text">List Your Crop</div>
        <div class="topbar-sub">Fasal Bazaar · Chat Flow</div>
      </div>
      <div class="topbar-avatar">🌾</div>
    </header>

    <!-- Mode switcher pill — seller / buyer tabs -->
    <div
      style="
        background: #f0f4ec;
        border-bottom: 1px solid #d4d4cc;
        padding: 8px 12px;
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
      "
    >
      <button
        id="modeSeller"
        onclick="ChatListing.setMode('seller')"
        style="
          flex: 1;
          max-width: 180px;
          padding: 8px 0;
          border-radius: 20px;
          border: 1.5px solid #5a8c2e;
          font-size: 13px;
          font-weight: 700;
          cursor: pointer;
          transition: all 0.2s;
          background: #2d5016;
          color: #fff;
        "
      >
        🌾 Sell a Crop
      </button>
      <button
        id="modeBuyer"
        onclick="ChatListing.setMode('buyer')"
        style="
          flex: 1;
          max-width: 180px;
          padding: 8px 0;
          border-radius: 20px;
          border: 1.5px solid #d4d4cc;
          font-size: 13px;
          font-weight: 700;
          cursor: pointer;
          transition: all 0.2s;
          background: #fff;
          color: #555550;
        "
      >
        🛒 Buy a Crop
      </button>
      <a
        href="selling.html"
        style="
          flex: 1;
          max-width: 180px;
          padding: 8px 0;
          border-radius: 20px;
          border: 1.5px solid #1a5490;
          font-size: 13px;
          font-weight: 700;
          cursor: pointer;
          transition: all 0.2s;
          background: #fff;
          color: #1a5490;
          text-align: center;
          text-decoration: none;
          display: block;
        "
      >
        📋 Use Form Instead
      </a>
    </div>

    <style>
      #modeSeller.active {
        background: #2d5016 !important;
        color: #fff !important;
        border-color: #2d5016 !important;
      }
      #modeBuyer.active {
        background: #1a5490 !important;
        color: #fff !important;
        border-color: #1a5490 !important;
      }
    </style>
    <div
      id="quick-replies"
      style="
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        padding: 0 15px;
        overflow-x: auto;
      "
    ></div>
    <!-- Chat area -->
    <div class="chat-bg" id="chat-scroll">
      <div id="chat-messages"></div>

      <!-- Typing loader -->
      <div id="chat-loading" style="padding-left: 40px; margin-top: 6px">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
      <div id="chat-input-row">
        <button class="icon-btn" id="chat-mic" title="Voice input">🎙️</button>
        <input
          type="text"
          id="chat-input"
          placeholder="Type your answer…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button class="icon-btn" id="chat-send" title="Send">&#10148;</button>
      </div>
      <div class="input-actions">
        <button id="chat-skip">⏭ Skip</button>
        <button id="chat-done">✓ Done</button>
      </div>
    </div>

    <!-- Dependencies -->
    <script src="api.js"></script>
    <script src="reverie.js"></script>
    <script src="site-translate.js"></script>
    <script src="chat-listing.js"></script>
  </body>
</html>
